<!DOCTYPE HTML>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete a Form</title>
	<link rel="stylesheet" href="styles/main.css">
</head>

<body>

<h1>Please complete our survey</h1>

<form action="confirmation.html" method="post">

    <fieldset>
        <legend>Contact information</legend>

        <label for="email">Email address:</label>
        <input type="email" id="email" name="email" accesskey="e" autofocus required>

        <label for="first_name">First name:</label>
        <input type="text" id="first_name" name="first_name" accesskey="f" required>

        <label for="last_name">Last name:</label>
        <input type="text" id="last_name" name="last_name" accesskey="l" required>
    </fieldset>

    <fieldset>
        <legend>Geographic information</legend>

        <label for="state">State:</label>
        <input type="text" id="state" name="state" accesskey="s"
               pattern="[A-Za-z]{2}" placeholder="Two characters" required>

        <label for="zip">Zip code:</label>
        <input type="text" id="zip" name="zip" accesskey="z"
               pattern="[0-9]{5}" placeholder="Five digits" required>
    </fieldset>

    <fieldset>
        <legend>Source</legend>

        <label for="source">How did you hear about us?</label>
        <select id="source" name="source" accesskey="h" required>
            <option value="">Select one</option>
            <option value="web">Web Search</option>
            <option value="friend">Friend</option>
            <option value="social">Social Media</option>
            <option value="ad">Advertisement</option>
            <option value="other">Other</option>
        </select>

        <label for="comments">Additional comments:</label>
        <textarea id="comments" name="comments" accesskey="c" rows="5"
                  placeholder="Add any additional comments here."></textarea>
    </fieldset>

    <button type="submit" class="btn submit">Submit</button>
    <button type="reset" class="btn reset">Reset</button>

</form>

</body>
</html>
